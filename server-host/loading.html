<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>MATRIX - BOOTING</title>
    <style>
        body {
            background: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            color: #0ea5e9;
            letter-spacing: 0.2em;
            margin-bottom: 5px;
        }

        p {
            font-size: 12px;
            color: #64748b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(14, 165, 233, 0.1);
            border-top-color: #0ea5e9;
            border-radius: 50%;
            margin: 30px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>MATRIX DMS</h1>
        <p>Initializing System Engine...</p>
        <div class="loader"></div>
        <div style="font-size: 10px; color: #334155; margin-top: 20px;">CORE NODE v1.6.0</div>
    </div>
</body>

</html>
