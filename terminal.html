<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix DMS | Terminal Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes subtle-float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-5px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .float-animation {
            animation: subtle-float 4s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-[#f8fafc]">
    <div id="root"></div>
    <script>
        // 动态寻址：自动适配当前服务器的 IP 与端口
        // 在生产环境中，服务器通过 3003 端口同时托管前端和 API
        const currentOrigin = window.location.origin; // e.g., http://10.0.0.2:3003
        window.location.href = currentOrigin + '/?mode=terminal';
    </script>
</body>

</html>
